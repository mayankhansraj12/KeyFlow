name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, test, and package
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Show toolchain
        run: swift --version

      - name: Validate sources and tests
        run: ./Scripts/validate.sh

      - name: Install pinned automation audit tools
        run: |
          ./Scripts/install-audit-tools.sh "$RUNNER_TEMP/audit-tools"
          echo "$RUNNER_TEMP/audit-tools" >> "$GITHUB_PATH"

      - name: Validate GitHub Actions workflows
        run: actionlint

      - name: Scan source and complete Git history for credentials
        run: |
          gitleaks dir --redact --no-banner .
          gitleaks git --redact --no-banner .

      - name: Run AddressSanitizer tests
        run: swift test --sanitize=address

      - name: Run ThreadSanitizer tests
        run: swift test --sanitize=thread

      - name: Enforce coverage floors
        run: ./Scripts/coverage.sh

      - name: Build universal release executable
        run: ./Scripts/build-universal.sh release "$RUNNER_TEMP/KeyFlowApp-universal"

      - name: Build ad-hoc CI application
        env:
          CODE_SIGN_IDENTITY: "-"
          KEYFLOW_EXECUTABLE: ${{ runner.temp }}/KeyFlowApp-universal
        run: ./Scripts/build-app.sh release

      - name: Verify application bundle
        run: ./Scripts/verify-app.sh

      - name: Qualify ZIP and DMG packaging round trip
        run: ./Scripts/qualify-local-package.sh

      - name: Archive CI artifact
        run: ditto -c -k --keepParent dist/KeyFlow.app KeyFlow-ci.zip

      - name: Upload CI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: KeyFlow-${{ github.sha }}
          path: KeyFlow-ci.zip
          if-no-files-found: error
          retention-days: 7
