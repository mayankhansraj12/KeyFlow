name: Developer ID Release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish the notarized artifacts as a GitHub release
        required: true
        default: false
        type: boolean
permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 45
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.RELEASE_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/release.keychain-db"
          CERTIFICATE="$RUNNER_TEMP/developer-id.p12"
          umask 077
          printf '%s' "$CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE"
          chmod 600 "$CERTIFICATE"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERTIFICATE" -k "$KEYCHAIN" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"

      - name: Store App Store Connect API credentials
        env:
          API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          API_KEY="$RUNNER_TEMP/AuthKey_$API_KEY_ID.p8"
          umask 077
          printf '%s' "$API_KEY_P8" > "$API_KEY"
          chmod 600 "$API_KEY"
          xcrun notarytool store-credentials "KeyFlow CI Notary" \
            --key "$API_KEY" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID"

      - name: Build, sign, notarize, and staple
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          DEVELOPER_TEAM_ID: ${{ secrets.DEVELOPER_TEAM_ID }}
          NOTARY_PROFILE: KeyFlow CI Notary
        run: ./Scripts/release.sh

      - name: Upload notarized artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: KeyFlow-notarized
          path: |
            release/*.dmg
            release/*.zip
            release/SHA256SUMS
            release/notarization-*.json
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)"
          TAG="v$VERSION"
          gh release create "$TAG" "release/KeyFlow-$VERSION.dmg" \
            --target "$GITHUB_SHA" \
            --title "KeyFlow $VERSION" \
            --notes-file "docs/RELEASE_NOTES_$VERSION.md" \
            --verify-tag \
            --latest

      - name: Remove ephemeral signing material
        if: ${{ always() }}
        run: |
          security delete-keychain "$RUNNER_TEMP/release.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP"/*.p12 "$RUNNER_TEMP"/*.p8
