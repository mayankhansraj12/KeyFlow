name: Developer ID Release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish the notarized artifacts as a GitHub release
        required: true
        default: false
        type: boolean
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 45
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.RELEASE_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/release.keychain-db"
          CERTIFICATE="$RUNNER_TEMP/developer-id.p12"
          printf '%s' "$CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERTIFICATE" -k "$KEYCHAIN" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"

      - name: Store App Store Connect API credentials
        env:
          API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          API_KEY="$RUNNER_TEMP/AuthKey_$API_KEY_ID.p8"
          printf '%s' "$API_KEY_P8" > "$API_KEY"
          xcrun notarytool store-credentials "KeyFlow CI Notary" \
            --key "$API_KEY" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID"

      - name: Build, sign, notarize, and staple
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          NOTARY_PROFILE: KeyFlow CI Notary
        run: ./Scripts/release.sh

      - name: Upload notarized artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: KeyFlow-notarized
          path: |
            release/*.dmg
            release/*.zip
            release/SHA256SUMS
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub release
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist)"
          TAG="v$VERSION"
          ARGS=("$TAG" release/*.dmg release/*.zip release/SHA256SUMS --target "$GITHUB_SHA" --title "KeyFlow $VERSION" --generate-notes --verify-tag)
          if [[ "$PRERELEASE" == "true" ]]; then
            ARGS+=(--prerelease)
          fi
          gh release create "${ARGS[@]}"
