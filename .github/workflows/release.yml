name: Developer ID Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: macos-26
    timeout-minutes: 45
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.RELEASE_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/release.keychain-db"
          CERTIFICATE="$RUNNER_TEMP/developer-id.p12"
          printf '%s' "$CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERTIFICATE" -k "$KEYCHAIN" -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"

      - name: Store App Store Connect API credentials
        env:
          API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          API_KEY="$RUNNER_TEMP/AuthKey_$API_KEY_ID.p8"
          printf '%s' "$API_KEY_P8" > "$API_KEY"
          xcrun notarytool store-credentials "KeyFlow CI Notary" \
            --key "$API_KEY" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID"

      - name: Build, sign, notarize, and staple
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          NOTARY_PROFILE: KeyFlow CI Notary
        run: ./Scripts/release.sh

      - name: Upload notarized artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KeyFlow-notarized
          path: |
            release/*.dmg
            release/*.zip
            release/SHA256SUMS
          if-no-files-found: error
          retention-days: 30
